<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RetroNav">
<meta name="theme-color" content="#1a0d00">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>RetroNav Mk.02</title>
<link href="https://fonts.googleapis.com/css2?family=Nixie+One&family=Orbitron:wght@400;700;900&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --amber:#ffb347;--amber-glow:#ff8c00;--amber-dim:#994d00;
    --nixie:#ff9933;--nixie-glow:#ff6600;--cream:#f5e6c8;
  }
  html,body{height:100%;height:100dvh;overflow:hidden;background:#0a0a0a}
  body{display:flex;justify-content:center;font-family:'Oswald',sans-serif}

  .dashboard{
    width:100%;max-width:430px;height:100dvh;
    background:
      repeating-linear-gradient(92deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px),
      repeating-linear-gradient(180deg,transparent,transparent 8px,rgba(0,0,0,.04) 8px,rgba(0,0,0,.04) 9px),
      linear-gradient(160deg,#5c2e0a 0%,#8b4513 15%,#6b3010 30%,#a0522d 45%,#7a3b18 55%,#c8722a 70%,#8b4513 85%,#4a1e08 100%);
    position:relative;display:flex;flex-direction:column;overflow:hidden;
  }
  .dashboard::before{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
    background:repeating-linear-gradient(175deg,transparent 0,transparent 3px,rgba(0,0,0,.08) 3px,rgba(0,0,0,.08) 4px,transparent 4px,transparent 10px,rgba(255,255,255,.03) 10px,rgba(255,255,255,.03) 11px);
  }
  .dashboard::after{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
    background:linear-gradient(120deg,rgba(255,255,255,.08) 0%,transparent 40%,rgba(0,0,0,.15) 70%,rgba(255,255,255,.04) 100%);
  }
  .scanline{position:absolute;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px)}
  .chrome-strip{width:100%;height:6px;flex-shrink:0;position:relative;z-index:10;background:linear-gradient(180deg,#e8dcc8 0%,#f5ede0 30%,#c8b89a 60%,#a09070 100%);box-shadow:0 2px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.6)}
  .scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;z-index:10;scrollbar-width:none}
  .scroll-area::-webkit-scrollbar{display:none}
  .content{display:flex;flex-direction:column;align-items:center;padding:12px 14px env(safe-area-inset-bottom,20px);gap:12px}

  .brand-badge{background:linear-gradient(145deg,#c8a870,#8b6914,#d4b484,#7a5c10);border-radius:4px;padding:5px 20px;border:1px solid #a08040;box-shadow:0 3px 12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.3),inset 0 -1px 0 rgba(0,0,0,.3)}
  .brand-badge span{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:4px;color:#1a0d00;text-shadow:0 1px 0 rgba(255,255,255,.4)}
  .rivets{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 4px}
  .rivet{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e8dcc8,#8b7050,#4a3020);box-shadow:0 2px 4px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.4)}

  .status-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 4px}
  .gps-status{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:600;letter-spacing:3px;color:var(--amber-dim);text-transform:uppercase}
  .gps-dot{width:8px;height:8px;border-radius:50%;background:#994d00;animation:blink 2s infinite}
  .gps-dot.connected{background:#39ff14;box-shadow:0 0 8px #0f0;animation:pulse 1.5s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
  .coord-value{font-family:'Nixie One',monospace;font-size:10px;color:var(--amber-dim)}

  /* Speedo */
  .speedo-container{position:relative;width:min(290px,74vw);height:min(290px,74vw)}
  .speedo-ring{
    width:100%;height:100%;border-radius:50%;
    background:radial-gradient(circle at 45% 40%,#2e1a08,#1a0d00);
    box-shadow:0 0 0 3px #6b3a1f,0 0 0 6px #3d1f0a,0 0 0 8px #c8b89a,0 0 0 10px #8b6914,0 8px 32px rgba(0,0,0,.8),inset 0 0 40px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  }
  .speedo-svg{position:absolute;inset:0;width:100%;height:100%}
  .speedo-center{position:absolute;display:flex;flex-direction:column;align-items:center;z-index:5;margin-top:28px}
  .speed-value{font-family:'Nixie One',monospace;font-size:min(68px,17vw);color:var(--nixie);text-shadow:0 0 8px var(--nixie-glow),0 0 20px rgba(255,100,0,.5),0 0 50px rgba(255,80,0,.2);line-height:1}
  .speed-unit{font-size:11px;font-weight:300;color:var(--amber-dim);letter-spacing:3px;margin-top:2px}

  /* Cards */
  .card{width:100%;background:linear-gradient(145deg,#1a0d00,#2a1505);border-radius:12px;border:1px solid #6b3a1f;box-shadow:0 0 0 2px #3d1f0a,inset 0 1px 0 rgba(255,255,255,.05),0 4px 16px rgba(0,0,0,.5);padding:12px 16px}
  .card-label{font-size:9px;font-weight:600;letter-spacing:4px;color:var(--amber-dim);text-transform:uppercase;margin-bottom:8px}

  /* Compass */
  .compass-display{display:flex;align-items:center;gap:14px}
  .compass-rose{width:72px;height:72px;flex-shrink:0}
  .compass-rose svg{width:100%;height:100%;transition:transform .4s ease}
  .direction-value{font-family:'Nixie One',monospace;font-size:42px;color:var(--nixie);text-shadow:0 0 10px var(--nixie-glow);line-height:1}
  .direction-name{font-size:14px;font-weight:600;color:var(--cream);letter-spacing:3px;margin-top:4px}

  /* Accuracy lamps — 6 in a row, fixed colors: red(1) amber(2) green(3) */
  .lamp-panel{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
  .lamp-label{font-size:7px;letter-spacing:2px;color:var(--amber-dim);text-align:right}
  .lamp-row-single{display:flex;gap:6px;align-items:center}
  /* Each lamp has a fixed color class set at build time */
  .lamp{width:10px;height:10px;border-radius:50%;background:#1a0800;border:1px solid #3a1a08;transition:all .3s}
  .lamp.lit-red  {background:#cc2200;border-color:#ff3300;box-shadow:0 0 7px #ff2200}
  .lamp.lit-amber{background:#cc7700;border-color:#ffaa00;box-shadow:0 0 7px #ff9900}
  .lamp.lit-green{background:#22bb00;border-color:#44ff00;box-shadow:0 0 7px #33ff00}

  /* Gauge grid */
  .gauge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
  .gauge-card{background:linear-gradient(145deg,#1a0d00,#2a1505);border-radius:10px;border:1px solid #6b3a1f;box-shadow:0 0 0 2px #3d1f0a,inset 0 1px 0 rgba(255,255,255,.05),0 4px 12px rgba(0,0,0,.4);padding:10px 10px 8px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .gauge-svg-wrap{width:min(120px,28vw);height:min(120px,28vw)}
  .gauge-svg-wrap svg{width:100%;height:100%}
  .gauge-digital{font-family:'Nixie One',monospace;font-size:18px;color:var(--nixie);text-shadow:0 0 6px var(--nixie-glow);text-align:center;line-height:1}
  .gauge-unit{font-size:9px;letter-spacing:2px;color:var(--amber-dim);text-transform:uppercase}
  .vs-arrow{font-size:20px;line-height:1;transition:color .3s}
  .vs-arrow.up{color:#39ff14;text-shadow:0 0 8px #0f0}
  .vs-arrow.down{color:#ff3300;text-shadow:0 0 8px #f30}
  .vs-arrow.flat{color:var(--amber-dim)}

  /* Info */
  .info-card{background:linear-gradient(145deg,#1a0d00,#2a1505);border-radius:10px;border:1px solid #6b3a1f;box-shadow:0 0 0 2px #3d1f0a,inset 0 1px 0 rgba(255,255,255,.05);padding:10px 12px;width:100%}
  .info-value{font-family:'Nixie One',monospace;font-size:24px;color:var(--nixie);text-shadow:0 0 8px var(--nixie-glow);line-height:1;margin-top:2px}
  .sub-text{font-family:'Nixie One',monospace;font-size:10px;color:var(--amber-dim);letter-spacing:1px;margin-top:3px}

  /* Clock */
  .clock-inner{display:flex;align-items:center;justify-content:space-between}
  .time-value{font-family:'Nixie One',monospace;font-size:52px;color:var(--nixie);text-shadow:0 0 10px var(--nixie-glow),0 0 25px rgba(255,100,0,.3);line-height:1;letter-spacing:4px}
  .date-value{font-family:'Nixie One',monospace;font-size:11px;color:var(--amber-dim);letter-spacing:2px;margin-top:4px}
  .sec-arc{transition:stroke-dashoffset 1s linear}

  /* Perm */
  .perm-overlay{position:fixed;inset:0;background:rgba(10,5,0,.97);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px 30px}
  .perm-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--amber);text-align:center;letter-spacing:2px;text-shadow:0 0 10px rgba(255,140,0,.5)}
  .perm-text{font-size:14px;color:var(--cream);text-align:center;line-height:1.8;opacity:.8}
  .perm-btn{background:linear-gradient(145deg,#c8a870,#8b6914,#d4b484);border:none;border-radius:8px;padding:14px 36px;font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:3px;color:#1a0d00;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.3);text-transform:uppercase}
  .perm-btn:active{transform:scale(.97)}
</style>
</head>
<body>

<div class="perm-overlay" id="permOverlay">
  <div class="brand-badge"><span>RetroNav Mk.02</span></div>
  <div class="perm-title">GPS信号を検出中</div>
  <div class="perm-text">現在地の情報を使用して<br>速度・方角・位置を表示します。<br><br>「許可」を選択してください。</div>
  <button class="perm-btn" onclick="initGPS()">エンジン始動</button>
</div>

<div class="dashboard">
  <div class="scanline"></div>
  <div class="chrome-strip"></div>
  <div class="scroll-area">
    <div class="content">

      <div class="rivets">
        <div class="rivet"></div>
        <div class="brand-badge"><span>RetroNav Mk.02</span></div>
        <div class="rivet"></div>
      </div>

      <div class="status-bar">
        <div class="gps-status">
          <div class="gps-dot" id="gpsDot"></div>
          <span id="gpsText">待機中</span>
        </div>
        <div class="coord-value" id="coordDisplay">--°-- --°--</div>
      </div>

      <!-- ══ Speedometer ══ -->
      <div class="speedo-container">
        <div class="speedo-ring">
          <svg class="speedo-svg" viewBox="0 0 280 280" id="speedoSvg"></svg>
          <div class="speedo-center">
            <div class="speed-value" id="speedValue">0</div>
            <div class="speed-unit">km/h</div>
          </div>
        </div>
      </div>

      <!-- ══ Compass ══ -->
      <div class="card">
        <div class="card-label">方位コンパス</div>
        <div class="compass-display">
          <div class="compass-rose">
            <svg viewBox="0 0 80 80" id="compassSvg">
              <circle cx="40" cy="40" r="38" fill="none" stroke="#6b3a1f" stroke-width="1.5"/>
              <circle cx="40" cy="40" r="36" fill="none" stroke="#3d1f0a" stroke-width="1"/>
              <g stroke="#994d00" stroke-width=".8">
                <line x1="40" y1="4" x2="40" y2="9"/>
                <line x1="76" y1="40" x2="71" y2="40"/>
                <line x1="40" y1="76" x2="40" y2="71"/>
                <line x1="4" y1="40" x2="9" y2="40"/>
              </g>
              <text x="40" y="18" text-anchor="middle" fill="#ffb347" font-size="9" font-family="Orbitron" font-weight="700">N</text>
              <text x="40" y="67" text-anchor="middle" fill="#994d00" font-size="7" font-family="Orbitron">S</text>
              <text x="67" y="43" text-anchor="middle" fill="#994d00" font-size="7" font-family="Orbitron">E</text>
              <text x="13" y="43" text-anchor="middle" fill="#994d00" font-size="7" font-family="Orbitron">W</text>
              <polygon points="40,12 43,40 40,46 37,40" fill="#ff3c00" opacity=".9"/>
              <polygon points="40,68 43,40 40,46 37,40" fill="#994d00" opacity=".6"/>
              <circle cx="40" cy="40" r="4" fill="#c8a870"/>
            </svg>
          </div>
          <div style="flex:1">
            <div class="direction-value" id="headingValue">---</div>
            <div class="direction-name" id="directionName">-- · --</div>
          </div>
          <!-- 6 lamps in a row: [red][amber][amber][green][green][green] -->
          <div class="lamp-panel">
            <div class="lamp-label">GPS精度</div>
            <div class="lamp-row-single">
              <!-- lamp index 0=red, 1=amber, 2=amber, 3=green, 4=green, 5=green -->
              <div class="lamp" id="lmp0"></div>
              <div class="lamp" id="lmp1"></div>
              <div class="lamp" id="lmp2"></div>
              <div class="lamp" id="lmp3"></div>
              <div class="lamp" id="lmp4"></div>
              <div class="lamp" id="lmp5"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ══ Altimeter + VS ══ -->
      <div class="gauge-grid">
        <div class="gauge-card">
          <div class="card-label">高度計</div>
          <div class="gauge-svg-wrap"><svg viewBox="0 0 120 120" id="altSvg"></svg></div>
          <div class="gauge-digital" id="altDigital">---</div>
          <div class="gauge-unit">METERS</div>
        </div>
        <div class="gauge-card">
          <div class="card-label">垂直速度 VS</div>
          <div class="gauge-svg-wrap"><svg viewBox="0 0 120 120" id="vsSvg"></svg></div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="vs-arrow flat" id="vsArrow">→</div>
            <div class="gauge-digital" id="vsDigital">--</div>
          </div>
          <div class="gauge-unit">m / min</div>
        </div>
      </div>

      <!-- GPS info -->
      <div class="info-card">
        <div class="card-label">GPS情報</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
          <div>
            <div style="font-size:8px;letter-spacing:2px;color:var(--amber-dim)">精度</div>
            <div class="info-value" id="accValue">±--</div>
            <div class="sub-text">METERS</div>
          </div>
          <div>
            <div style="font-size:8px;letter-spacing:2px;color:var(--amber-dim)">座標</div>
            <div class="sub-text" id="latValue" style="margin-top:6px">LAT ------</div>
            <div class="sub-text" id="lonValue">LON ------</div>
          </div>
        </div>
      </div>

      <!-- Clock -->
      <div class="card">
        <div class="card-label">現在時刻</div>
        <div class="clock-inner">
          <div>
            <div class="time-value" id="timeValue">--:--</div>
            <div class="date-value" id="dateValue">----年--月--日</div>
          </div>
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="28" fill="none" stroke="#2a1505" stroke-width="4"/>
            <circle cx="32" cy="32" r="28" fill="none" stroke="#994d00" stroke-width="4"
              stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-linecap="round"
              transform="rotate(-90 32 32)" id="secArc" class="sec-arc"/>
            <text x="32" y="36" text-anchor="middle" font-family="Nixie One" font-size="14" fill="#ffb347" id="secText">00</text>
          </svg>
        </div>
      </div>

      <div class="rivets" style="padding-bottom:4px">
        <div class="rivet"></div><div class="rivet"></div><div class="rivet"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// UNIVERSAL needle helper
// Uses SVG <line> from center pointing UP, rotated via
// SVG transform="rotate(deg, cx, cy)" — no CSS transform-origin conflicts.
// angleDeg: 0 = needle points UP (12 o'clock)
// ═══════════════════════════════════════════════════════
function setNeedleAngle(elemId, angleDeg, cx, cy) {
  const el = document.getElementById(elemId);
  if (!el) return;
  el.setAttribute('transform', `rotate(${angleDeg}, ${cx}, ${cy})`);
}

// ═══════════════════════════════════════════════════════
// SPEEDOMETER
// Layout: 0 km/h at ~220° CW from top (7 o'clock side)
//         180 km/h at ~480° = 120° CW from top (4 o'clock side)
//         Total span = 260°
//
// In SVG angles (rotate(x, cx, cy) — x is CW from 12 o'clock):
//   speed=0   → needle angle = -130° (i.e. 220° - 90° ... actually just use direct mapping)
//
// Simplest approach: define startAngle as the SVG rotation when speed=0.
// rotate(0)=12 o'clock. We want 0 km/h at 7 o'clock = -130° from 12 = rotate(-130).
// We want 180 km/h at 5 o'clock = +130° from 12 = rotate(+130).
// Total span = 260°, startAngle = -130°.
// ═══════════════════════════════════════════════════════
const SPD_CX = 140, SPD_CY = 140, SPD_R = 118;
const SPD_START = -130; // degrees from 12 o'clock when speed=0
const SPD_SPAN  =  260; // total degrees
const SPD_MAX   =  180; // km/h

function spdAngle(kmh) {
  return SPD_START + (Math.min(kmh, SPD_MAX) / SPD_MAX) * SPD_SPAN;
}

// Convert needle angle (0=12 o'clock, CW) to SVG arc coordinate angle (0=3 o'clock, CCW)
// svgCoord = -(needleAngle - 90) = 90 - needleAngle
function needleToCoord(needleDeg) {
  return (needleDeg - 90) * Math.PI / 180; // standard math radians
}

function ptOnCircle(cx, cy, r, needleDeg) {
  const rad = (needleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function buildSpeedoSVG() {
  const svg = document.getElementById('speedoSvg');
  const cx = SPD_CX, cy = SPD_CY, r = SPD_R;
  let h = '';

  // Defs
  h += `<defs>
    <linearGradient id="nGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffaa44"/>
      <stop offset="60%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="hubG" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#e8d880"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>
  </defs>`;

  // Background track arc (from start to end angle)
  const p0 = ptOnCircle(cx, cy, r, SPD_START);
  const p1 = ptOnCircle(cx, cy, r, SPD_START + SPD_SPAN);
  h += `<path d="M${p0.x.toFixed(2)},${p0.y.toFixed(2)} A${r},${r} 0 1,1 ${p1.x.toFixed(2)},${p1.y.toFixed(2)}" fill="none" stroke="#2a1505" stroke-width="8"/>`;

  // Red zone arc (130–180 km/h)
  const pr0 = ptOnCircle(cx, cy, r - 10, spdAngle(130));
  const pr1 = ptOnCircle(cx, cy, r - 10, spdAngle(180));
  h += `<path d="M${pr0.x.toFixed(2)},${pr0.y.toFixed(2)} A${r-10},${r-10} 0 0,1 ${pr1.x.toFixed(2)},${pr1.y.toFixed(2)}" fill="none" stroke="rgba(255,50,0,.4)" stroke-width="6"/>`;

  // Tick marks and labels — using same spdAngle() as needle
  for (let i = 0; i <= 18; i++) {
    const spd = i * 10;
    const ang = spdAngle(spd);
    const r1 = r - 4, r2 = r1 - (i % 3 === 0 ? 18 : 9);
    const tp1 = ptOnCircle(cx, cy, r1, ang);
    const tp2 = ptOnCircle(cx, cy, r2, ang);
    const isMajor = i % 3 === 0;
    h += `<line x1="${tp1.x.toFixed(2)}" y1="${tp1.y.toFixed(2)}" x2="${tp2.x.toFixed(2)}" y2="${tp2.y.toFixed(2)}" stroke="${isMajor ? '#c8a870' : '#6b3a1f'}" stroke-width="${isMajor ? 2.5 : 1}"/>`;
    if (isMajor) {
      const lp = ptOnCircle(cx, cy, r2 - 17, ang);
      h += `<text x="${lp.x.toFixed(2)}" y="${(lp.y + 4).toFixed(2)}" text-anchor="middle" fill="#a06030" font-size="13" font-family="Nixie One">${spd}</text>`;
    }
  }

  // Needle — SVG rotate around center, so no CSS transform-origin issues
  const nLen = r * 0.78;
  const nBack = 16;
  h += `<g id="spdNeedle" transform="rotate(${SPD_START}, ${cx}, ${cy})">
    <line x1="${cx}" y1="${cy - nLen}" x2="${cx}" y2="${cy + nBack}" stroke="url(#nGrad)" stroke-width="3.5" stroke-linecap="round"/>
  </g>`;

  // Hub
  h += `<circle cx="${cx}" cy="${cy}" r="11" fill="url(#hubG)"/>
  <circle cx="${cx}" cy="${cy}" r="4.5" fill="#f0d890"/>`;

  svg.innerHTML = h;
}
buildSpeedoSVG();

function updateSpeed(mps) {
  const kmh = Math.round((mps || 0) * 3.6);
  document.getElementById('speedValue').textContent = kmh;
  setNeedleAngle('spdNeedle', spdAngle(kmh), SPD_CX, SPD_CY);
}

// ═══════════════════════════════════════════════════════
// ALTIMETER
// Aviation style. 1 full rotation = 1000 m.
// Dial: 0 at top, marks 0-9 (each = 100 m).
// Needle angle = (alt / 1000) * 360, starting from -90° (12 o'clock = 0 m)
// ═══════════════════════════════════════════════════════
function buildAltSVG() {
  const svg = document.getElementById('altSvg');
  const cx = 60, cy = 60, r = 52;
  let h = '';

  h += `<defs><radialGradient id="hubA" cx="40%" cy="35%"><stop offset="0%" stop-color="#e8d880"/><stop offset="100%" stop-color="#8b6914"/></radialGradient></defs>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#1a0d00"/>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#6b3a1f" stroke-width="2"/>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${r-3}" fill="none" stroke="#2a1005" stroke-width="1"/>`;

  // 10 major divisions (0–9, each 100 m), 50 minor ticks total
  for (let i = 0; i < 50; i++) {
    const isMajor = i % 5 === 0;
    // needle at 0 m points UP (12 o'clock = -90° in standard, but rotate(0)=12 o'clock here)
    // so tick at position i/50 of full circle, starting from 12 o'clock going CW
    const ang = (i / 50) * 360 - 90; // standard math angle
    const rad = ang * Math.PI / 180;
    const r1 = r - 3, r2 = r1 - (isMajor ? 11 : 5);
    const x1 = cx + r1 * Math.cos(rad), y1 = cy + r1 * Math.sin(rad);
    const x2 = cx + r2 * Math.cos(rad), y2 = cy + r2 * Math.sin(rad);
    h += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${isMajor ? '#c8a870' : '#6b3a1f'}" stroke-width="${isMajor ? 1.5 : .8}"/>`;
    if (isMajor) {
      const lr = r2 - 10;
      const lx = cx + lr * Math.cos(rad), ly = cy + lr * Math.sin(rad);
      h += `<text x="${lx.toFixed(1)}" y="${(ly + 3).toFixed(1)}" text-anchor="middle" fill="#a06030" font-size="8" font-family="Nixie One">${i / 5}</text>`;
    }
  }

  // Needle (rotate(0) = pointing UP = 0 m)
  h += `<g id="altNeedle" transform="rotate(0, ${cx}, ${cy})">
    <line x1="${cx}" y1="${cy - r * 0.76}" x2="${cx}" y2="${cy + 12}" stroke="#ff9944" stroke-width="2.5" stroke-linecap="round"/>
  </g>`;
  h += `<circle cx="${cx}" cy="${cy}" r="5" fill="url(#hubA)"/>
  <circle cx="${cx}" cy="${cy}" r="2.5" fill="#f0d890"/>`;
  h += `<text x="${cx}" y="${cy + 43}" text-anchor="middle" fill="#4a2510" font-size="6.5" font-family="Oswald" letter-spacing="1">×100m</text>`;

  svg.innerHTML = h;
}
buildAltSVG();

function updateAlt(alt) {
  const m = alt !== null ? Math.round(alt) : null;
  document.getElementById('altDigital').textContent = m !== null ? m : '---';
  if (m !== null) {
    // 1 rotation = 1000 m; rotate(0) = 12 o'clock = 0 m
    const ang = (m / 1000) * 360;
    setNeedleAngle('altNeedle', ang, 60, 60);
  }
}

// ═══════════════════════════════════════════════════════
// VERTICAL SPEED INDICATOR
// Range: ±500 m/min
// Layout: 0 at top (12 o'clock), +500 (climb) spreads left (CCW), -500 spreads right (CW)
// Span: 270° total (±135° from 12 o'clock)
// Labels: ×10 m/min → show ±1,±2,±3,±4,±5
// needle angle = -(vs / 500) * 135   (negative = CW = descent)
// ═══════════════════════════════════════════════════════
const VS_CX = 60, VS_CY = 60, VS_R = 52;
const VS_MAX = 500; // m/min
const VS_SPAN_HALF = 135; // degrees each side

function vsAngle(vsMpm) {
  // climb (positive) → CCW → negative rotation
  // descent (negative) → CW → positive rotation
  return -(Math.max(-VS_MAX, Math.min(VS_MAX, vsMpm)) / VS_MAX) * VS_SPAN_HALF;
}

function buildVSSVG() {
  const svg = document.getElementById('vsSvg');
  const cx = VS_CX, cy = VS_CY, r = VS_R;
  let h = '';

  h += `<defs><radialGradient id="hubV" cx="40%" cy="35%"><stop offset="0%" stop-color="#e8d880"/><stop offset="100%" stop-color="#8b6914"/></radialGradient></defs>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#1a0d00"/>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#6b3a1f" stroke-width="2"/>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${r-3}" fill="none" stroke="#2a1005" stroke-width="1"/>`;

  // Major labels at 0, ±1, ±2, ±3, ±4, ±5 (×100 m/min)
  // +values (climb) are CCW from top, -values (descent) are CW from top
  const majorVs = [500, 400, 300, 200, 100, 0, -100, -200, -300, -400, -500];
  majorVs.forEach(v => {
    const ang = vsAngle(v); // needle angle (0=up)
    // convert to coordinate angle for tick mark
    const coordRad = (ang - 90) * Math.PI / 180;
    const r1 = r - 3, r2 = r1 - 11;
    const x1 = cx + r1 * Math.cos(coordRad), y1 = cy + r1 * Math.sin(coordRad);
    const x2 = cx + r2 * Math.cos(coordRad), y2 = cy + r2 * Math.sin(coordRad);
    const col = v > 0 ? '#33dd00' : v < 0 ? '#ff6644' : '#c8a870';
    h += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${col}" stroke-width="1.5"/>`;
    if (v % 100 === 0) {
      const lr = r2 - 10;
      const lx = cx + lr * Math.cos(coordRad), ly = cy + lr * Math.sin(coordRad);
      const label = v === 0 ? '0' : `${v > 0 ? '+' : ''}${v / 100}`;
      h += `<text x="${lx.toFixed(1)}" y="${(ly + 3).toFixed(1)}" text-anchor="middle" fill="${col}" font-size="7.5" font-family="Nixie One">${label}</text>`;
    }
  });

  // Minor ticks every 50 m/min
  for (let v = -500; v <= 500; v += 50) {
    if (majorVs.includes(v)) continue;
    const ang = vsAngle(v);
    const coordRad = (ang - 90) * Math.PI / 180;
    const r1 = r - 3, r2 = r1 - 5;
    const x1 = cx + r1 * Math.cos(coordRad), y1 = cy + r1 * Math.sin(coordRad);
    const x2 = cx + r2 * Math.cos(coordRad), y2 = cy + r2 * Math.sin(coordRad);
    h += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#6b3a1f" stroke-width=".8"/>`;
  }

  // Color arcs (subtle)
  const arcPath = (v1, v2, col, rr) => {
    const a1r = (vsAngle(v1) - 90) * Math.PI / 180;
    const a2r = (vsAngle(v2) - 90) * Math.PI / 180;
    const x1 = cx + rr * Math.cos(a1r), y1 = cy + rr * Math.sin(a1r);
    const x2 = cx + rr * Math.cos(a2r), y2 = cy + rr * Math.sin(a2r);
    // sweep: CW=1, CCW=0. Climb goes CCW (v increases → angle decreases → CCW)
    const sweep = v2 < v1 ? 0 : 1;
    return `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${rr},${rr} 0 0,${sweep} ${x2.toFixed(2)},${y2.toFixed(2)}" fill="none" stroke="${col}" stroke-width="3" opacity=".25"/>`;
  };
  h += arcPath(0, 500, '#33ff00', r - 10);
  h += arcPath(-500, 0, '#ff6644', r - 10);

  // Needle
  h += `<g id="vsNeedle" transform="rotate(0, ${cx}, ${cy})">
    <line x1="${cx}" y1="${cx - r * 0.76}" x2="${cx}" y2="${cy + 12}" stroke="#ff9944" stroke-width="2.5" stroke-linecap="round"/>
  </g>`;
  h += `<circle cx="${cx}" cy="${cy}" r="5" fill="url(#hubV)"/>
  <circle cx="${cx}" cy="${cy}" r="2.5" fill="#f0d890"/>`;
  h += `<text x="${cx}" y="${cy + 43}" text-anchor="middle" fill="#4a2510" font-size="6" font-family="Oswald" letter-spacing="1">×100m/min</text>`;

  svg.innerHTML = h;
}
buildVSSVG();

let lastAlt = null, lastAltTime = null, lastVsMpm = 0;

function updateVS(alt) {
  const now = Date.now();
  if (alt !== null) {
    if (lastAlt !== null && lastAltTime !== null) {
      const dt = (now - lastAltTime) / 60000; // minutes
      if (dt >= 0.05) { // update every ~3s
        lastVsMpm = (alt - lastAlt) / dt;
        lastAlt = alt; lastAltTime = now;
      }
    } else {
      lastAlt = alt; lastAltTime = now;
    }
    setNeedleAngle('vsNeedle', vsAngle(lastVsMpm), VS_CX, VS_CY);
    document.getElementById('vsDigital').textContent = Math.round(lastVsMpm);
    const arrow = document.getElementById('vsArrow');
    if (lastVsMpm > 10)       { arrow.textContent = '↑'; arrow.className = 'vs-arrow up'; }
    else if (lastVsMpm < -10) { arrow.textContent = '↓'; arrow.className = 'vs-arrow down'; }
    else                      { arrow.textContent = '→'; arrow.className = 'vs-arrow flat'; }
  }
}

// ═══════════════════════════════════════════════════════
// COMPASS
// ═══════════════════════════════════════════════════════
function updateHeading(h) {
  if (h === null || h === undefined) return;
  const deg = Math.round(h);
  document.getElementById('headingValue').textContent = deg + '°';
  const dirs = ['北 N','北東 NE','東 E','南東 SE','南 S','南西 SW','西 W','北西 NW'];
  document.getElementById('directionName').textContent = dirs[Math.round(deg / 45) % 8];
  document.getElementById('compassSvg').style.transform = `rotate(${-deg}deg)`;
}

// ═══════════════════════════════════════════════════════
// ACCURACY LAMPS
// 6 lamps in a row: [0]=red, [1]=amber, [2]=amber, [3]=green, [4]=green, [5]=green
// Full precision → all 6 lit. Precision degrades → lamps go out from RIGHT to LEFT.
// ═══════════════════════════════════════════════════════
const LAMP_COLORS = ['red', 'amber', 'amber', 'green', 'green', 'green'];

function updateAccLamps(acc) {
  let litCount;
  if (!acc)        litCount = 0;
  else if (acc <=  3) litCount = 6;
  else if (acc <=  5) litCount = 5;
  else if (acc <= 10) litCount = 4;
  else if (acc <= 20) litCount = 3;
  else if (acc <= 50) litCount = 2;
  else if (acc <=100) litCount = 1;
  else                litCount = 0;

  for (let i = 0; i < 6; i++) {
    const el = document.getElementById(`lmp${i}`);
    if (i < litCount) {
      el.className = `lamp lit-${LAMP_COLORS[i]}`;
    } else {
      el.className = 'lamp';
    }
  }
}

// ═══════════════════════════════════════════════════════
// POSITION
// ═══════════════════════════════════════════════════════
function updatePosition(lat, lon, alt, acc) {
  document.getElementById('latValue').textContent = `LAT ${lat.toFixed(4)}`;
  document.getElementById('lonValue').textContent = `LON ${lon.toFixed(4)}`;
  document.getElementById('accValue').textContent = acc ? `±${Math.round(acc)}` : '±--';
  const latDir = lat >= 0 ? 'N' : 'S';
  const lonDir = lon >= 0 ? 'E' : 'W';
  document.getElementById('coordDisplay').textContent =
    `${Math.abs(lat).toFixed(3)}°${latDir} ${Math.abs(lon).toFixed(3)}°${lonDir}`;
  updateAlt(alt);
  updateVS(alt);
  updateAccLamps(acc);
}

// ═══════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('timeValue').textContent =
    String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateValue').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日(${days[now.getDay()]})`;
  const s = now.getSeconds();
  document.getElementById('secArc').style.strokeDashoffset = 175.9 * (1 - s / 60);
  document.getElementById('secText').textContent = String(s).padStart(2, '0');
}
setInterval(updateClock, 1000);
updateClock();

// ═══════════════════════════════════════════════════════
// GPS
// ═══════════════════════════════════════════════════════
function initGPS() {
  document.getElementById('permOverlay').style.display = 'none';
  if (!navigator.geolocation) {
    document.getElementById('gpsText').textContent = '非対応';
    return;
  }
  document.getElementById('gpsText').textContent = '取得中...';
  navigator.geolocation.watchPosition(
    pos => {
      const { latitude: lat, longitude: lon, altitude: alt, accuracy: acc, speed, heading } = pos.coords;
      document.getElementById('gpsDot').className = 'gps-dot connected';
      document.getElementById('gpsText').textContent = 'GPS受信中';
      updateSpeed(speed || 0);
      updateHeading(heading);
      updatePosition(lat, lon, alt, acc);
    },
    () => {
      document.getElementById('gpsDot').className = 'gps-dot';
      document.getElementById('gpsText').textContent = 'エラー';
    },
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
  );
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(() => {});
}
</script>
